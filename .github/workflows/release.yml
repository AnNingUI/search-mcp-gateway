name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: search-mcp-gateway

jobs:
  build-release-assets:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_extension: tar.gz
          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_extension: zip
          - name: macOS
            runner: macos-14
            target: aarch64-apple-darwin
            archive_extension: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive_name="${BIN_NAME}-${{ matrix.target }}.${{ matrix.archive_extension }}"
          binary_path="target/${{ matrix.target }}/release/${BIN_NAME}"
          mkdir -p dist
          tar -czf "dist/${archive_name}" -C "$(dirname "${binary_path}")" "$(basename "${binary_path}")"

      - name: Package archive on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "$env:BIN_NAME-${{ matrix.target }}.${{ matrix.archive_extension }}"
          $binaryPath = "target\${{ matrix.target }}\release\$env:BIN_NAME.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $binaryPath -DestinationPath "dist\$archiveName"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-assets

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            release-assets/*
          generate_release_notes: true
